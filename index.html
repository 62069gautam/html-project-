<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            <h1>NETFLIX</h1>
        </div>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">New & Popular</a></li>
                <li><a href="#">My List</a></li>
            </ul>
        </nav>

        <button class="sign-btn">Sign In</button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="overlay">
            <div class="hero-content">
                <h1>Unlimited Movies, TV Shows and More</h1>

                <p>
                    Watch anywhere. Cancel anytime.
                </p>

                <button class="watch-btn">
                    Watch Now
                </button>
            </div>
        </div>
    </section>

    <!-- Trending Movies -->
    <section class="movies">

        <h2>Trending Now</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="images/movie1.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie2.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie3.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie4.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie5.jpg" alt="">
            </div>

        </div>

    </section>

    <!-- Popular -->
    <section class="movies">

        <h2>Popular on Netflix</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="images/movie6.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie7.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie8.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie9.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie10.jpg" alt="">
            </div>

        </div>

    </section>

    <!-- Continue Watching -->
    <section class="movies">

        <h2>Continue Watching</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="images/movie11.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie12.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie13.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie14.jpg" alt="">
            </div>

            <div class="movie-card">
                <img src="images/movie15.jpg" alt="">
            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <h3>Netflix Clone</h3>

        <p>
            Made with HTML & CSS
        </p>

        <p>
            © 2026 All Rights Reserved.
        </p>

    </footer>

</body>
</html>
