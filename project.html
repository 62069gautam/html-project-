<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body>

<h1 align="center">Student Registration Form</h1>

<form>

    <label>Full Name:</label><br>
    <input type="text" placeholder="Enter your name"><br><br>

    <label>Father's Name:</label><br>
    <input type="text" placeholder="Enter father's name"><br><br>

    <label>Mother's Name:</label><br>
    <input type="text" placeholder="Enter mother's name"><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="Enter email"><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" placeholder="Enter mobile number"><br><br>

    <label>Password:</label><br>
    <input type="password" placeholder="Enter password"><br><br>

    <label>Date of Birth:</label><br>
    <input type="date"><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other
    <br><br>

    <label>Course:</label><br>
    <select>
        <option>Select Course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>MCA</option>
    </select>
    <br><br>

    <label>Skills:</label><br>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JavaScript
    <input type="checkbox"> Java
    <br><br>

    <label>Address:</label><br>
    <textarea rows="5" cols="30" placeholder="Enter your address"></textarea>
    <br><br>

    <label>Upload Photo:</label><br>
    <input type="file"><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
